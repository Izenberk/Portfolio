openapi: 3.0.3
info:
  title: Portfolio API
  description: Backend for Portfolio - Migrated from TS to Go
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local Development Server

paths:
  # --- Projects ---
  /projects:
    get:
      summary: Get all portfolio projects
      operationId: getProjects
      responses:
        '200':
          description: A list of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'

  # --- Experience ---
  /experience:
    get:
      summary: Get work experience list
      operationId: getExperience
      responses:
        '200':
          description: A list of experiences
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Experience'

  # --- Skills ---
  /skills:
    get:
      summary: Get skills categorized
      operationId: getSkills
      responses:
        '200':
          description: A list of skill categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SkillCategory'

  # --- Contact ---
  /contact:
    post:
      summary: Submit contact form
      operationId: postContact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactRequest'
      responses:
        '201':
          description: Message received
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

components:
  schemas:
    # --- Projects ---
    Project:
      type: object
      required: [id, slug, title, summary, stack, links]
      properties:
        id:
          type: string
          example: "65b2f1234567890abcdef123" # This will be the string version of Mongo _id
        slug: { type: string }
        title: { type: string }
        summary: { type: string }
        details: { type: array, items: { type: string } }
        stack: { type: array, items: { type: string } }
        links:
          type: object
          properties:
            demo: { type: string }
            repo: { type: string }
        image: { type: string }
        contributors: { type: string }
        order: { type: integer }

    # --- Experience ---
    Experience:
      type: object
      required: [id, role, company, start]
      properties:
        id: { type: string }
        role: { type: string }
        company: { type: string }
        url: { type: string }
        start: { type: string }
        end: { type: string }
        location: { type: string }
        tags: { type: array, items: { type: string } }
        description: { type: array, items: { type: string } }
        order: { type: integer }

    # --- Skills ---
    SkillItem:
      type: object
      required: [name, level]
      properties:
        name: { type: string }
        level: { type: string }
        icon: { type: string }
        description: { type: string }

    SkillCategory:
      type: object
      required: [id, title]
      properties:
        id: { type: string }
        title: { type: string }
        items: { type: array, items: { $ref: '#/components/schemas/SkillItem' } }
        order: { type: integer }

    # --- Auth User ---
    User:
      type: object
      required: [id, email]
      properties:
        id: { type: string }
        email: { type: string, format: email }

    # --- Contact Form ---
    ContactRequest:
      type: object
      required: [name, email, message]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        subject: { type: string }
        message: { type: string }

    # --- Standard Response ---
    MessageResponse:
      type: object
      required: [message]
      properties:
        message: { type: string }